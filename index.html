<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación de Cumpleaños - ¡Mis 24!</title>
    <link rel="stylesheet" href="style.css">
    <script src="canvas-confetti.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Pinyon+Script&display=swap" rel="stylesheet">
</head>
<body>

    <div class="background-overlay"></div>

    <div id="loader" class="loader-container">
        <div class="card-shape loader-card">
            <div class="sparkle top-left">✦</div>
            <div class="sparkle bottom-right">✦</div>
            
            <div class="avatar-display">
                <div class="avatar-circle">
                    <img src="img/sinbonete.png" id="avatar-img" alt="Avatar">
                </div>
            </div>
            
            <div class="loading-status">
                <div class="spinner"></div>
                <p class="loading-text">Cargando...</p>
            </div>
        </div>
    </div>

    <div id="envelope-container" class="envelope-container hidden">
        <div class="envelope-wrapper">
            <div class="envelope">
                <div class="flap"></div>
                <div class="pocket"></div>
                <div class="lips-seal"></div>
                <div class="letter">
                    <p class="envelope-title">¡Sorpresa!</p>
                    <p class="envelope-subtitle" style="font-size: 0.85rem; margin-top: 2px; font-style: italic; color: #a12b2b; font-family: sans-serif;">Estás invitado a mi cumpleaños</p>
                </div>
            </div>
            <button class="open-envelope-btn" onclick="openEnvelope()">Tienes una invitación, haz clic para abrir</button>
        </div>
    </div>

    <main id="main-content" class="main-content hidden">
        <div class="card-shape invitation-card">
            <div class="sparkle top-left">✦<br><span style="font-size:0.6em; margin-left:10px;">✦</span></div>
            <div class="sparkle bottom-right">✦<br><span style="font-size:0.6em; margin-left:-10px;">✦</span></div>

            <p class="subtitle">Te invito a celebrar mis</p>
            <h1 class="main-title">24 Años</h1>

            <div class="cake-container">
                <div class="cake-photo-wrapper">
                    <img src="img/torta.png" class="photo-inside-cake" alt="Torta Corazón">
                </div>
            </div>

            <div class="event-details">
                <div class="details-row">
                    <span class="detail-item">DOMINGO</span>
                    <span class="detail-divider"></span>
                    <span class="detail-day">28</span>
                    <span class="detail-divider"></span>
                    <span class="detail-item">12:30 P.M.</span>
                </div>
                <p class="month-label">Junio</p>
            </div>

            <section class="countdown-section">
                <h3>FALTAN:</h3>
                <div id="countdown" class="countdown-grid">
                    <div class="time-block"><span id="days">00</span><p>Días</p></div>
                    <div class="time-block"><span id="hours">00</span><p>Hs</p></div>
                    <div class="time-block"><span id="minutes">00</span><p>Min</p></div>
                    <div class="time-block"><span id="seconds">00</span><p>Seg</p></div>
                </div>
            </section>

            <section class="interaction-buttons" style="display: flex; flex-direction: column; gap: 12px; margin: 20px 0; align-items: center;">
                <a href="https://maps.app.goo.gl/qgKgpKrh87iW6qvy9" target="_blank" class="btn-link" style="display: inline-flex; align-items: center; justify-content: center; gap: 8px; width: 85%; max-width: 280px; padding: 12px; background-color: #fdf6ec; border: 1px solid #f5a7a7; color: #a12b2b; text-decoration: none; border-radius: 20px; font-weight: bold; font-size: 0.9rem; letter-spacing: 1px; transition: all 0.3s ease; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
                    📍 VER UBICACIÓN
                </a>
                
                <a href="https://wa.link/dk0a7k" target="_blank" class="btn-link confirm-btn" style="display: inline-flex; align-items: center; justify-content: center; gap: 8px; width: 85%; max-width: 280px; padding: 12px; background-color: #f5a7a7; border: none; color: white; text-decoration: none; border-radius: 20px; font-weight: bold; font-size: 0.9rem; letter-spacing: 1px; transition: all 0.3s ease; box-shadow: 0 3px 8px rgba(245, 167, 167, 0.4);">
                    ✅ CONFIRMAR ASISTENCIA
                </a>
            </section>

            <section class="carousel-section">
                <div class="carousel-container">
                    <div class="carousel-slide">
                         <img src="img/IMG_2317.jpeg" class="carousel-img active" alt="Foto 0">
                        <img src="img/IMG_2308.jpeg" class="carousel-img active" alt="Foto 1">
                        <img src="img/IMG_2309.jpeg" class="carousel-img" alt="Foto 2">
                        <img src="img/IMG_2310.jpeg" class="carousel-img" alt="Foto 3">
                        <img src="img/IMG_2312.jpeg" class="carousel-img" alt="Foto 4">
                        <img src="img/IMG_2313.jpeg" class="carousel-img" alt="Foto 5">
                        <img src="img/IMG_2319.jpeg" class="carousel-img" alt="Foto 6">
                        <img src="img/IMG_2320.jpeg" class="carousel-img" alt="Foto 7">
                        <img src="img/IMG_2321.jpeg" class="carousel-img" alt="Foto 8">
                        <img src="img/IMG_2322.jpeg" class="carousel-img" alt="Foto 9">
                        <img src="img/IMG_2323.jpeg" class="carousel-img" alt="Foto 10">
                    </div>
                    <button class="carousel-btn prev" onclick="moveSlide(-1)" type="button">❮</button>
                    <button class="carousel-btn next" onclick="moveSlide(1)" type="button">❯</button>
                </div>
            </section>

            <footer class="invitation-footer">
                <div class="wine-glass"></div>
                <p class="phrasing">¡Te espero para celebrar juntos!</p>
            </footer>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
